version: '3.9'

services:

  # ─── Oracle Database ─────────────────────────────────────────────────────
  # Note: Oracle XE (Express Edition) is free for development.
  # Pull the official image: docker pull gvenzl/oracle-xe
  db:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: url-shortener-db
    environment:
      ORACLE_PASSWORD: oracle_root_pass
      APP_USER: url_shortener
      APP_USER_PASSWORD: url_shortener
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Spring Boot Application ──────────────────────────────────────────────
  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: url_shortener
      SPRING_DATASOURCE_PASSWORD: url_shortener
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_BASE_URL: http://localhost:8080
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local
  redis-data:
    driver: local
