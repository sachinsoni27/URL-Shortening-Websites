server:
  port: 8080
  base-url: http://localhost:8080

spring:
  application:
    name: url-shortener

  # ─── H2 In-Memory Database (dev/demo mode — no Oracle needed) ───────────
  datasource:
    url: jdbc:h2:mem:urlshortenerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  # ─── JPA / Hibernate ────────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ─── Disable Redis / Cache (no Redis required for dev) ──────────────────────
  cache:
    type: simple          # In-memory Caffeine-style simple cache (no Redis)

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ─── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# ─── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.example.urlshortener: INFO
    org.hibernate.SQL: WARN
